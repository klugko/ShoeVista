version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: shoevista-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - shoevista-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shoevista-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/shoevista
    depends_on:
      - mongodb
    networks:
      - shoevista-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=
    container_name: shoevista-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shoevista-network

volumes:
  mongo_data:

networks:
  shoevista-network:
    driver: bridge
